<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>POS Ristorante - Custom KUBE II</title>
  <link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2c3e50">
    <style>
        /* --- STILI INTERFACCIA (Invariati) --- */
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .menu-categorie { display: flex; background-color: #34495e; padding: 10px; gap: 5px; overflow-x: auto; border-bottom: 2px solid #1a252f; }
        .menu-categorie button { padding: 12px 20px; border: none; border-radius: 4px; background-color: #ecf0f1; color: #2c3e50; font-weight: bold; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .area-sinistra { flex: 3; display: flex; flex-direction: column; border-right: 2px solid #1a252f; position: relative; }
        .area-prodotti { flex: 1; display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: 65px; gap: 6px; padding: 10px; overflow-y: auto; align-content: start; }
        .prodotto { border: none; border-radius: 4px; font-weight: bold; cursor: grab; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2px; text-align: center; color: white; font-size: 0.75rem; line-height: 0.9rem; }
        .prodotto:active { cursor: grabbing; }
        .prodotto small { font-size: 0.65rem; opacity: 0.9; }
        #schermata-tavoli { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #2c3e50; display: none; flex-direction: column; padding: 20px; z-index: 20; box-sizing: border-box; overflow-y: auto; }
        .sezione-titolo { background: #1a252f; padding: 10px; margin: 15px 0 5px 0; border-radius: 4px; font-weight: bold; }
        .griglia-tavoli { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-tavolo { height: 80px; border: none; border-radius: 5px; background: #27ae60; color: white; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-tavolo.occupato { background: #c0392b !important; border: 2px solid white; }
        .btn-tavolo.camera-style { background: #8e44ad; }
        .area-laterale { flex: 0.8; background-color: #ecf0f1; color: #333; padding: 15px; display: flex; flex-direction: column; }
        #lista-ordine { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .riga-item { display: flex; justify-content: space-between; padding: 12px 8px; border-bottom: 1px dashed #ccc; cursor: pointer; }
        .riga-item.selezionata { background-color: #3498db !important; color: white; border-radius: 5px; }
        .display-tastierino { background: #111; color: #2ecc71; padding: 10px; text-align: right; font-family: monospace; font-size: 1.5rem; border-top: 2px solid #444; min-height: 30px; }
        .tastierino-container { display: grid; grid-template-columns: 1.2fr 2fr 1.5fr; gap: 8px; padding: 10px; background-color: #1a252f; }
        .btn-pos { height: 50px; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; background-color: #34495e; }
        .blue { background-color: #2980b9; } .orange { background-color: #f39c12; } .red { background-color: #c0392b; } .num { background-color: #ecf0f1; color: #2c3e50; }
        .green { background-color: #27ae60; } .teal { background-color: #16a085; }
    </style>
</head>
<body>

    <nav class="menu-categorie">
        <button onclick="mostraCategoria('bevande')">Bevande</button> 
        <button onclick="mostraCategoria('Lista vini')">lista vini</button>
        <button onclick="mostraCategoria('antipasti')">Antipasti</button>
        <button onclick="mostraCategoria('primi')">Primi</button>
        <button onclick="mostraCategoria('secondi')">Secondi</button>
        <button onclick="mostraCategoria('dessert')">Dessert</button>
        <button onclick="mostraCategoria('caffe')">Caffè</button>
        <button onclick="mostraCategoria('amari')">Amari</button>
        <button onclick="mostraCategoria('camere')">Camere</button>
    </nav>

    <div class="main-container">
        <div class="area-sinistra">
            <div class="area-prodotti" id="griglia-prodotti"></div>
            
            <div id="schermata-tavoli">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="titolo-tavoli">TAVOLI</h2>
                    <button onclick="chiudiTavoli()" style="padding:10px 20px; background:red; color:white; border:none; border-radius:5px;">X CHIUDI</button>
                </div>
                
                <div id="area-mappa">
                    <div class="sezione-titolo">SALA (1-10)</div>
                    <div class="griglia-tavoli" id="tavoli-sala"></div>
                    <div class="sezione-titolo">TERRAZZA (14-21)</div>
                    <div class="griglia-tavoli" id="tavoli-terrazza"></div>
                    <div class="sezione-titolo">CAMERE (1-7)</div>
                    <div class="griglia-tavoli" id="tavoli-camere"></div>
                </div>

                <div id="lista-scontrini-tavolo" style="display:none; background:#ecf0f1; color:#333; padding:20px; border-radius:8px;">
                    <h3 id="nome-tavolo-dettaglio"></h3>
                    <div id="corpo-scontrini"></div>
                    <button onclick="chiudiDettaglioTavolo()" style="width:100%; padding:15px; margin-top:10px; background:#34495e; color:white; border:none; border-radius:5px;">INDIETRO</button>
                </div>
            </div>

            <div class="display-tastierino" id="display-tasti"></div>
            
            <div class="tastierino-container">
                <div class="griglia-tasti" style="display:grid; grid-template-columns: 1fr; gap:4px">
                    <button class="btn-pos blue" onclick="apriTavoli('selezione')">Tavoli</button>
                    <button class="btn-pos teal" onclick="aggiungiNuovoArticoloListino()">+ Voce</button>
                    <button class="btn-pos blue" onclick="strumentiRecupero()">Strumenti</button>
                    <button class="btn-pos red" onclick="chiusura()" style="background-color: #7f8c8d;">Chiusura</button>
                </div>
                <div class="griglia-tasti" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px">
                    <button class="btn-pos num" onclick="digita('7')">7</button><button class="btn-pos num" onclick="digita('8')">8</button><button class="btn-pos num" onclick="digita('9')">9</button>
                    <button class="btn-pos num" onclick="digita('4')">4</button><button class="btn-pos num" onclick="digita('5')">5</button><button class="btn-pos num" onclick="digita('6')">6</button>
                    <button class="btn-pos num" onclick="digita('1')">1</button><button class="btn-pos num" onclick="digita('2')">2</button><button class="btn-pos num" onclick="digita('3')">3</button>
                    <button class="btn-pos num" onclick="digita('0')">0</button><button class="btn-pos num" onclick="digita('.')">.</button><button class="btn-pos num" onclick="digita('x')">X</button>
                </div>
                <div class="griglia-tasti" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px">
                    <button class="btn-pos orange" onclick="cancellaBuffer()">C</button>
                    <button class="btn-pos blue" onclick="apriTavoli('sposta')">Sposta</button>
                    <button class="btn-pos green" onclick="modificaQuantita(1)">+ 1</button>
                    <button class="btn-pos red" onclick="modificaQuantita(-1)">- 1</button>
                    <button class="btn-pos blue" onclick="emettiProforma()">Proforma</button>
                    <button class="btn-pos red" onclick="svuotaOrdine()">Cancella</button>
                </div>
            </div>
        </div>

        <div class="area-laterale">
            <h3>TAVOLO: <span id="tavolo-attuale">---</span></h3>
            <div id="lista-ordine"></div>
            <hr>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>TOTALE:</span>
                <h2 id="prezzo-totale" style="margin: 0;">0.00 €</h2>
            </div>
        </div>
    </div>

<script src="prodotti.js"></script>
<script>
    // --- COSTANTI E STATO ---
    const LARGHEZZA_RIGA = 31;
    const MARGINE_STAMPA = "        "; 

    let totaleCorrente = 0;
    let buffer = "";
    let articoliInCorso = [];
    let ordiniArchiviati = JSON.parse(localStorage.getItem('pos_data')) || []; 
    let modalitaTavoli = 'selezione';
    let idRigaSelezionata = null;
    let catAttuale = 'bar';

    let contatoreProforma = parseInt(localStorage.getItem('contatoreProforma')) || 1;
    let archivioProforma = JSON.parse(localStorage.getItem('archivioProforma')) || [];
    let prodottiExtra = JSON.parse(localStorage.getItem('prodotti_extra')) || [];

    function salvaSuDisco() { 
        localStorage.setItem('prodotti_extra', JSON.stringify(prodottiExtra));
        localStorage.setItem('pos_data', JSON.stringify(ordiniArchiviati));
        localStorage.setItem('archivioProforma', JSON.stringify(archivioProforma));
        localStorage.setItem('contatoreProforma', contatoreProforma);
    }

    // --- FUNZIONE DI INVIO A RAW BT ---
    function inviaARawBT(testo) {
        const base64 = btoa(unescape(encodeURIComponent(testo)));
        window.location.href = "rawbt:base64," + base64;
    }

    // --- FUNZIONI DI STAMPA (AGGIORNATE PER TABLET) ---
    function stampaFinestra(proforma) {
        let testo = "\n" + MARGINE_STAMPA + "*** PROFORMA ***\n";
        testo += MARGINE_STAMPA + "N. " + proforma.numero + " - " + proforma.tavolo + "\n";
        testo += MARGINE_STAMPA + new Date().toLocaleDateString() + " " + proforma.ora + "\n";
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        
        proforma.articoli.forEach(item => {
            const q = `${item.qta}x `; 
            const p = `EUR${(item.qta * item.prezzo).toFixed(2).padStart(7, " ")}`;
            const n = item.nome.substring(0, LARGHEZZA_RIGA - q.length - p.length - 1);
            const sp = Math.max(1, LARGHEZZA_RIGA - (q.length + n.length + p.length));
            testo += MARGINE_STAMPA + q + n + " ".repeat(sp) + p + "\n";
        });
        
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        testo += MARGINE_STAMPA + "TOTALE: EUR " + proforma.totale.toFixed(2).padStart(8) + "\n\n";
        testo += MARGINE_STAMPA + "Doc. non fiscale\n\n\n\n\n";
        
        inviaARawBT(testo);
    }

    function stampaCucina(nomeTavolo, articoli) {
        let testo = "\n" + MARGINE_STAMPA + "--- ORDINE CUCINA ---\n";
        testo += MARGINE_STAMPA + "TAVOLO: " + nomeTavolo + "\n";
        testo += MARGINE_STAMPA + "ORA: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + "\n";
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        
        articoli.forEach(item => {
            testo += MARGINE_STAMPA + item.qta + " x " + item.nome.toUpperCase() + "\n";
        });

        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n\n\n\n\n";
        
        inviaARawBT(testo);
    }

    function chiusura() {
        if (archivioProforma.length === 0) return alert("Nessun dato in archivio per la chiusura.");
        if (!confirm("Effettuare la CHIUSURA giornaliera? Tutti i dati verranno azzerati.")) return;

        let c = { RIST: 0, CAME: 0, TASS: 0 };
        let d = { RIST: "", CAME: "", TASS: "" };

        archivioProforma.forEach(p => {
            if(!p.articoli) return;
            p.articoli.forEach(art => {
                let imp = (art.prezzo || 0) * (art.qta || 0);
                let rep = art.reparto || "RIST";
                if (!c.hasOwnProperty(rep)) rep = "RIST";
                c[rep] += imp;
                d[rep] += `${MARGINE_STAMPA}N.${p.numero} ${p.tavolo.toString().padEnd(8)} EUR ${imp.toFixed(2).padStart(8)}\n`;
            });
        });

        let testo = "\n" + MARGINE_STAMPA + "CHIUSURA DEL " + new Date().toLocaleDateString() + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** RISTORANTE/BAR **\n";
        testo += (d.RIST || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE RIST: EUR " + c.RIST.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** CAMERE **\n";
        testo += (d.CAME || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE CAME: EUR " + c.CAME.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** TASSA SOGGIORNO **\n";
        testo += (d.TASS || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE TASS: EUR " + c.TASS.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "TOTALE GENERALE: EUR " + (c.RIST+c.CAME+c.TASS).toFixed(2) + "\n\n\n\n\n";

        inviaARawBT(testo);
        
        archivioProforma = []; 
        contatoreProforma = 1; 
        salvaSuDisco(); 
        location.reload();
    }

    // --- LOGICA INTERFACCIA (Invariata) ---
    function digita(v) { buffer += v; aggiornaDisplay(); }
    function cancellaBuffer() { buffer = ""; aggiornaDisplay(); }
    function aggiornaDisplay() { document.getElementById('display-tasti').innerText = buffer; }

    function aggiungiAOrdine(nome, prezzoBase, reparto = 'RIST') {
        let qta = 1, prezzoFinale = prezzoBase;
        if (buffer && buffer !== "") {
            if (buffer.includes('x')) {
                let parti = buffer.split('x');
                qta = parseFloat(parti[0]) || 1;
                if (parti[1] && parti[1] !== "") prezzoFinale = parseFloat(parti[1]);
            } else { 
                prezzoFinale = parseFloat(buffer) || prezzoBase; 
            }
        }
        articoliInCorso.push({ 
        id: Date.now() + Math.random(), 
        nome: nome, prezzo: prezzoFinale, qta: qta, reparto: reparto || 'RIST'
    });
        renderingOrdine();
        cancellaBuffer();
    localStorage.setItem('ordine_corrente', JSON.stringify(articoliInCorso));
}

    function renderingOrdine() {
        const lista = document.getElementById('lista-ordine');
        if(!lista) return;
        lista.innerHTML = ""; totaleCorrente = 0;
        articoliInCorso.forEach(item => {
            const subTot = item.qta * item.prezzo;
            const div = document.createElement('div');
            div.className = `riga-item ${idRigaSelezionata === item.id ? 'selezionata' : ''}`;
            div.onclick = () => { idRigaSelezionata = (idRigaSelezionata === item.id) ? null : item.id; renderingOrdine(); };
            div.innerHTML = `<span>${item.qta} x ${item.nome}</span><b>${subTot.toFixed(2)} €</b>`;
            lista.appendChild(div);
            totaleCorrente += subTot;
        });
        document.getElementById('prezzo-totale').innerText = totaleCorrente.toFixed(2) + " €";
    }

    function mostraCategoria(cat) {
        catAttuale = cat.toLowerCase().trim();
        const griglia = document.getElementById('griglia-prodotti'); 
        if(!griglia) return;
        griglia.innerHTML = '';
        const filtrati = prodottiExtra.filter(p => p.cat.toLowerCase() === catAttuale);
        filtrati.forEach((p) => {
            const indexOriginale = prodottiExtra.indexOf(p);
            const btn = document.createElement('button'); 
            btn.className = 'prodotto';
            btn.style.backgroundColor = getColoreCSS(p.colore);
            btn.setAttribute('draggable', true);
            btn.onclick = () => aggiungiAOrdine(p.nome, p.prezzo, p.reparto);
            btn.innerHTML = `<span>${p.nome}</span><small>${p.prezzo.toFixed(2)}€</small>`;
            griglia.appendChild(btn);
        });
    }

    function getColoreCSS(c) {
        const colori = { 'azzurro': '#3498db', 'verde': '#27ae60', 'viola': '#9b59b6', 'arancione': '#e67e22', 'rosso': '#e74c3c', 'giallo': '#f1c40f' };
        return colori[c] || '#3498db';
    }

    function apriTavoli(modo) { modalitaTavoli = modo; chiudiDettaglioTavolo(); document.getElementById('schermata-tavoli').style.display = 'flex'; aggiornaMappa(); }
    function chiudiTavoli() { document.getElementById('schermata-tavoli').style.display = 'none'; }
    function aggiornaMappa() {
        const sala = document.getElementById('tavoli-sala'), terr = document.getElementById('tavoli-terrazza'), cam = document.getElementById('tavoli-camere');
        sala.innerHTML = ""; terr.innerHTML = ""; cam.innerHTML = "";
        const creaBtn = (pref, i, cont, cl = "") => {
            const n = `${pref} ${i}`;
            const ords = ordiniArchiviati.filter(o => o.tavolo === n);
            const t = ords.reduce((s, o) => s + (o.totale || 0), 0);
            const btn = document.createElement('button');
            btn.className = `btn-tavolo ${cl} ${ords.length > 0 ? 'occupato' : ''}`;
            btn.onclick = () => selezionaTavolo(n);
            btn.innerHTML = `<span>${pref} ${i}</span>${ords.length > 0 ? `<b>${t.toFixed(2)}€</b>` : ''}`;
            cont.appendChild(btn);
        };
        for(let i=1; i<=10; i++) creaBtn('Sala', i, sala);
        for(let i=14; i<=21; i++) creaBtn('Terr.', i, terr);
        for(let i=1; i<=7; i++) creaBtn('Cam.', i, cam, 'camera-style');
    }

    function selezionaTavolo(nome) {
        if (articoliInCorso.length > 0) {
            const nuovoOrdine = { id: Date.now(), tavolo: nome, ora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), articoli: [...articoliInCorso], totale: totaleCorrente };
            ordiniArchiviati.push(nuovoOrdine);
            stampaCucina(nome, articoliInCorso);
            salvaSuDisco(); svuotaOrdine(); chiudiTavoli();
        } else { mostraDettaglio(nome); }
    }

    function mostraDettaglio(nome) {
        document.getElementById('area-mappa').style.display = 'none';
        document.getElementById('lista-scontrini-tavolo').style.display = 'block';
        document.getElementById('nome-tavolo-dettaglio').innerText = nome;
        const corpo = document.getElementById('corpo-scontrini');
        corpo.innerHTML = "";
        const ordini = ordiniArchiviati.filter(o => o.tavolo === nome);
        ordini.forEach(o => {
            const div = document.createElement('div');
            div.style = "background:white; padding:10px; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between; align-items:center; color:#333";
            div.innerHTML = `<span>Ore ${o.ora} - <b>${o.totale.toFixed(2)}€</b></span>
                <div>
                    <button onclick="richiama(${o.id})" style="background:#3498db; color:white; border:none; padding:5px 10px; border-radius:3px;">Mod</button>
                    <button onclick="stampaSingoloDaTavolo(${o.id})" style="background:#f39c12; color:white; border:none; padding:5px 10px; border-radius:3px;">Stampa</button>
                </div>`;
            corpo.appendChild(div);
        });
    }

    function chiudiDettaglioTavolo() { document.getElementById('area-mappa').style.display = 'block'; document.getElementById('lista-scontrini-tavolo').style.display = 'none'; }
    function svuotaOrdine() { articoliInCorso = []; renderingOrdine(); document.getElementById('tavolo-attuale').innerText = "---"; localStorage.removeItem('ordine_corrente');
}

    function emettiProforma() {
        if (articoliInCorso.length === 0) return alert("Ordine vuoto!");
        const dp = { numero: contatoreProforma, tavolo: document.getElementById('tavolo-attuale').innerText, articoli: [...articoliInCorso], totale: totaleCorrente, ora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        stampaFinestra(dp);
        archivioProforma.push(dp);
        contatoreProforma++;
        svuotaOrdine(); salvaSuDisco(); aggiornaMappa();
    }

    function stampaSingoloDaTavolo(id) {
        const idx = ordiniArchiviati.findIndex(o => o.id === id);
        if (idx === -1) return;
        const o = ordiniArchiviati[idx];
        const dp = { numero: contatoreProforma, tavolo: o.tavolo, articoli: o.articoli, totale: o.totale, ora: o.ora };
        stampaFinestra(dp);
        archivioProforma.push(dp);
        contatoreProforma++;
        ordiniArchiviati.splice(idx, 1);
        salvaSuDisco(); chiudiTavoli(); aggiornaMappa();
    }

function aggiungiNuovoArticoloListino() {
    const nome = prompt("Nome Dessert:"); 
    if(!nome) return;
    
    const prezzoInput = prompt("Prezzo:", "0");
    if(prezzoInput === null) return;
    const prezzo = parseFloat(prezzoInput.replace(',', '.'));

    // Suggerisce la categoria in cui ti trovi (es. dessert)
    let cat = prompt("Categoria (bevande, vini, dessert, camere...):", catAttuale); 
    if(!cat) return;
    cat = cat.toLowerCase().trim(); // Rende tutto minuscolo e toglie spazi

    prodottiExtra.push({ 
        nome: nome, 
        prezzo: prezzo, 
        cat: cat, 
        reparto: 'RIST', 
        colore: (cat === 'dessert' ? 'giallo' : 'azzurro') // Colore specifico per dessert
    });

    salvaSuDisco(); 
    mostraCategoria(cat); 
}
    function richiama(id) {
        const idx = ordiniArchiviati.findIndex(o => o.id === id);
        articoliInCorso = [...ordiniArchiviati[idx].articoli];
        document.getElementById('tavolo-attuale').innerText = ordiniArchiviati[idx].tavolo;
        ordiniArchiviati.splice(idx, 1);
        salvaSuDisco(); renderingOrdine(); chiudiTavoli();
    }

    function modificaQuantita(n) {
        if (!idRigaSelezionata) return;
        const idx = articoliInCorso.findIndex(a => a.id === idRigaSelezionata);
        articoliInCorso[idx].qta += n;
        if (articoliInCorso[idx].qta <= 0) articoliInCorso.splice(idx, 1);
        renderingOrdine();
    }

    function strumentiRecupero() {
        if (buffer !== "" && !buffer.includes('x')) {
            const numScelto = parseInt(buffer);
            const idx = archivioProforma.findIndex(p => p.numero === numScelto);
            if (idx !== -1) {
                const p = archivioProforma[idx];
                articoliInCorso = [...p.articoli];
                document.getElementById('tavolo-attuale').innerText = p.tavolo;
                archivioProforma.splice(idx, 1);
                salvaSuDisco(); renderingOrdine(); cancellaBuffer(); chiudiTavoli();
            }
            return;
        }
    }
function mostraDettaglio(nome) {
        document.getElementById('area-mappa').style.display = 'none';
        document.getElementById('lista-scontrini-tavolo').style.display = 'block';
        document.getElementById('nome-tavolo-dettaglio').innerText = nome;
        const corpo = document.getElementById('corpo-scontrini');
        corpo.innerHTML = "";
        
        const ordini = ordiniArchiviati.filter(o => o.tavolo === nome);

        // --- AGGIUNTA: BOTTONE STAMPA UNIFICATA ---
        if (ordini.length > 1) {
            const btnU = document.createElement('button');
            btnU.innerHTML = "📄 STAMPA PROFORMA TOTALE";
            btnU.style = "width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:5px; margin-bottom:15px; cursor:pointer; font-weight:bold;";
            btnU.onclick = () => emettiProformaUnificato(nome);
            corpo.appendChild(btnU);
        }
        // ------------------------------------------

        ordini.forEach(o => {
            const div = document.createElement('div');
            div.style = "background:white; padding:10px; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between; align-items:center; color:#333";
            div.innerHTML = `<span>Ore ${o.ora} - <b>${o.totale.toFixed(2)}€</b></span>
                <div>
                    <button onclick="richiama(${o.id})" style="background:#3498db; color:white; border:none; padding:5px 10px; border-radius:3px;">Mod</button>
                    <button onclick="stampaSingoloDaTavolo(${o.id})" style="background:#f39c12; color:white; border:none; padding:5px 10px; border-radius:3px;">Stampa</button>
                </div>`;
            corpo.appendChild(div);
        });
    }

    // --- FUNZIONE UNIFICATA PER RAW BT ---
    function emettiProformaUnificato(nomeTavolo) {
        const ordini = ordiniArchiviati.filter(o => o.tavolo === nomeTavolo);
        let tuttiArt = []; 
        let tot = 0;

        ordini.forEach(o => { 
            tuttiArt = tuttiArt.concat(o.articoli); 
            tot += o.totale; 
        });

        const dp = { 
            numero: contatoreProforma, 
            tavolo: nomeTavolo, 
            articoli: tuttiArt, 
            totale: tot, 
            ora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
        };

        // Invia a Raw BT
        stampaFinestra(dp);
        
        // Archivia per la chiusura serale
        archivioProforma.push(dp);
        contatoreProforma++;
        
        // Rimuove tutti gli ordini separati di quel tavolo perché ora sono chiusi
        ordiniArchiviati = ordiniArchiviati.filter(o => o.tavolo !== nomeTavolo);
        
        salvaSuDisco(); 
        chiudiTavoli(); 
        aggiornaMappa();
        alert("Proforma Unificato inviato a Raw BT");
    }

};

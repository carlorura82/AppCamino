<script>
    // --- COSTANTI E STATO ---
    const LARGHEZZA_RIGA = 31;
    const MARGINE_STAMPA = "        "; 

    let totaleCorrente = 0;
    let buffer = "";
    let articoliInCorso = [];
    let ordiniArchiviati = JSON.parse(localStorage.getItem('pos_data')) || []; 
    let modalitaTavoli = 'selezione';
    let idRigaSelezionata = null;
    let catAttuale = 'bar';

    let contatoreProforma = parseInt(localStorage.getItem('contatoreProforma')) || 1;
    let archivioProforma = JSON.parse(localStorage.getItem('archivioProforma')) || [];
    let prodottiExtra = JSON.parse(localStorage.getItem('prodotti_extra')) || [];

   function salvaSuDisco() { 
    // 1. Salva sempre una copia locale (per sicurezza)
    localStorage.setItem('prodotti_extra', JSON.stringify(prodottiExtra));
    localStorage.setItem('pos_data', JSON.stringify(ordiniArchiviati));
    localStorage.setItem('archivioProforma', JSON.stringify(archivioProforma));
    localStorage.setItem('contatoreProforma', contatoreProforma);

    // 2. SINCRONIZZA IL LISTINO SU FIREBASE
    db.collection("configurazione").doc("listino").set({
        articoli: prodottiExtra
    }).then(() => {
        console.log("Cloud Update: Success");
    }).catch((error) => {
        console.error("Cloud Update Error: ", error);
    });
}

    // --- FUNZIONE DI INVIO A RAW BT ---
    function inviaARawBT(testo) {
        const base64 = btoa(unescape(encodeURIComponent(testo)));
        window.location.href = "rawbt:base64," + base64;
    }

    // --- FUNZIONI DI STAMPA (AGGIORNATE PER TABLET) ---
    function stampaFinestra(proforma) {
        let testo = "\n" + MARGINE_STAMPA + "*** PROFORMA ***\n";
        testo += MARGINE_STAMPA + "N. " + proforma.numero + " - " + proforma.tavolo + "\n";
        testo += MARGINE_STAMPA + new Date().toLocaleDateString() + " " + proforma.ora + "\n";
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        
        proforma.articoli.forEach(item => {
            const q = `${item.qta}x `; 
            const p = `EUR${(item.qta * item.prezzo).toFixed(2).padStart(7, " ")}`;
            const n = item.nome.substring(0, LARGHEZZA_RIGA - q.length - p.length - 1);
            const sp = Math.max(1, LARGHEZZA_RIGA - (q.length + n.length + p.length));
            testo += MARGINE_STAMPA + q + n + " ".repeat(sp) + p + "\n";
        });
        
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        testo += MARGINE_STAMPA + "TOTALE: EUR " + proforma.totale.toFixed(2).padStart(8) + "\n\n";
        testo += MARGINE_STAMPA + "Doc. non fiscale\n\n\n\n\n";
        
        inviaARawBT(testo);
    }
function menuModificaTesto() {
    const n = prompt("Nuovo Nome:", articoloInModifica.nome);
    const p = prompt("Nuovo Prezzo:", articoloInModifica.prezzo);
    
    if (n !== null) articoloInModifica.nome = n;
    if (p !== null) articoloInModifica.prezzo = parseFloat(p.toString().replace(',', '.'));
    
    document.getElementById('custom-menu').style.display = 'none';
    salvaSuDisco();
    mostraCategoria(catAttuale);
}

function mostraPaletteColori() {
    const palette = document.getElementById('palette-colori');
    const menu = document.getElementById('custom-menu');
    
    palette.style.left = menu.style.left;
    palette.style.top = (parseInt(menu.style.top) + 50) + "px"; // La mette leggermente sotto
    palette.style.display = "grid";

    // Usiamo i codici colore che hai già nel CSS
    const coloriDisponibili = ['azzurro', 'verde', 'viola', 'arancione', 'rosso', 'giallo'];
    palette.innerHTML = '';
    
    coloriDisponibili.forEach(c => {
        const div = document.createElement('div');
        div.style.width = "40px";
        div.style.height = "40px";
        div.style.backgroundColor = getColoreCSS(c);
        div.style.borderRadius = "5px";
        div.style.cursor = "pointer";
        div.style.border = "1px solid #ccc";
        
        div.onclick = (e) => {
            e.stopPropagation();
            articoloInModifica.colore = c;
            salvaSuDisco();
            mostraCategoria(catAttuale);
            palette.style.display = "none";
            document.getElementById('custom-menu').style.display = 'none';
        };
        palette.appendChild(div);
    });
}
function attivaSpostamento() {
    modalitaSpostamento = true; 
    document.getElementById('custom-menu').style.display = 'none'; 
    document.getElementById('barra-spostamento').style.display = 'block'; // Mostra la barra

}
function menuEliminaArticolo() {
    if (confirm(`Vuoi eliminare definitivamente ${articoloInModifica.nome}?`)) {
        prodottiExtra = prodottiExtra.filter(p => p !== articoloInModifica);
        salvaSuDisco();
        mostraCategoria(catAttuale);
    }
    document.getElementById('custom-menu').style.display = 'none';
}
    function stampaCucina(nomeTavolo, articoli) {
        let testo = "\n" + MARGINE_STAMPA + "--- ORDINE CUCINA ---\n";
        testo += MARGINE_STAMPA + "TAVOLO: " + nomeTavolo + "\n";
        testo += MARGINE_STAMPA + "ORA: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + "\n";
        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n";
        
        articoli.forEach(item => {
            testo += MARGINE_STAMPA + item.qta + " x " + item.nome.toUpperCase() + "\n";
        });

        testo += MARGINE_STAMPA + "-".repeat(LARGHEZZA_RIGA) + "\n\n\n\n\n";
        
        inviaARawBT(testo);
    }

    function chiusura() {
        if (archivioProforma.length === 0) return alert("Nessun dato in archivio per la chiusura.");
        if (!confirm("Effettuare la CHIUSURA giornaliera? Tutti i dati verranno azzerati.")) return;

        let c = { RIST: 0, CAME: 0, TASS: 0 };
        let d = { RIST: "", CAME: "", TASS: "" };

        archivioProforma.forEach(p => {
            if(!p.articoli) return;
            p.articoli.forEach(art => {
                let imp = (art.prezzo || 0) * (art.qta || 0);
                let rep = art.reparto || "RIST";
                if (!c.hasOwnProperty(rep)) rep = "RIST";
                c[rep] += imp;
                d[rep] += `${MARGINE_STAMPA}N.${p.numero} ${p.tavolo.toString().padEnd(8)} EUR ${imp.toFixed(2).padStart(8)}\n`;
            });
        });

        let testo = "\n" + MARGINE_STAMPA + "CHIUSURA DEL " + new Date().toLocaleDateString() + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** RISTORANTE/BAR **\n";
        testo += (d.RIST || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE RIST: EUR " + c.RIST.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** CAMERE **\n";
        testo += (d.CAME || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE CAME: EUR " + c.CAME.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "** TASSA SOGGIORNO **\n";
        testo += (d.TASS || MARGINE_STAMPA + "(nessuna voce)\n");
        testo += MARGINE_STAMPA + "TOTALE TASS: EUR " + c.TASS.toFixed(2).padStart(8) + "\n";
        testo += MARGINE_STAMPA + "------------------------------\n";
        testo += MARGINE_STAMPA + "TOTALE GENERALE: EUR " + (c.RIST+c.CAME+c.TASS).toFixed(2) + "\n\n\n\n\n";

        inviaARawBT(testo);
        
        archivioProforma = []; 
        contatoreProforma = 1; 
        salvaSuDisco(); 
        location.reload();
    }

    // --- LOGICA INTERFACCIA (Invariata) ---
    function digita(v) { buffer += v; aggiornaDisplay(); }
    function cancellaBuffer() { buffer = ""; aggiornaDisplay(); }
    function aggiornaDisplay() { document.getElementById('display-tasti').innerText = buffer; }

function aggiungiSegue() {
    // Creiamo un elemento separatore
    const separatore = {
        id: Date.now(),
        nome: "---------- SEGUE ----------", // Questo verrà stampato chiaramente
        prezzo: 0,
        qta: "",
        reparto: "LINEA", // Un reparto speciale per non influenzare i calcoli
        isSeparatore: true // Flag utile per la formattazione
    };

    // Lo aggiungiamo alla lista articoli
    articoliInCorso.push(separatore);
    
    // Aggiorniamo il carrello e facciamo scorrere in basso
    renderingOrdine();
    localStorage.setItem('ordine_corrente', JSON.stringify(articoliInCorso));
    
    // Feedback sul display
    document.getElementById('display-tasti').innerHTML = `<span style="color: #27ae60;">Linea 'Segue' inserita</span>`;
}

    function aggiungiAOrdine(nome, prezzoBase, reparto = 'RIST') {
        let qta = 1, prezzoFinale = prezzoBase;
        if (buffer && buffer !== "") {
            if (buffer.includes('x')) {
                let parti = buffer.split('x');
                qta = parseFloat(parti[0]) || 1;
                if (parti[1] && parti[1] !== "") prezzoFinale = parseFloat(parti[1]);
            } else { 
                prezzoFinale = parseFloat(buffer) || prezzoBase; 
            }
        }
        articoliInCorso.push({ 
        id: Date.now() + Math.random(), 
        nome: nome, prezzo: prezzoFinale, qta: qta, reparto: reparto || 'RIST'
    });
        renderingOrdine();
        cancellaBuffer();
    localStorage.setItem('ordine_corrente', JSON.stringify(articoliInCorso));
}

function mostraCategoria(cat) {
    catAttuale = cat.toLowerCase().trim();
    const griglia = document.getElementById('griglia-prodotti'); 
    if(!griglia) return;
    griglia.innerHTML = '';



    const filtrati = prodottiExtra.filter(p => p.cat.toLowerCase() === catAttuale);

    filtrati.forEach((p, index) => {
        const btn = document.createElement('button'); 
        btn.className = 'prodotto';
        btn.style.backgroundColor = getColoreCSS(p.colore);
        
        // --- PROTEZIONE TABLET ---
        btn.style.userSelect = "none";
        btn.style.webkitUserSelect = "none";
        btn.style.touchAction = "manipulation"; 

        // Visualizzazione stato durante lo spostamento
        if (modalitaSpostamento) {
            btn.style.border = "3px dashed rgba(255,255,255,0.8)";
            if (indicePrimoElemento === index) {
                btn.style.background = "#000"; // Evidenzia il primo elemento selezionato
                btn.style.border = "3px solid gold";
            }
        }

        // --- GESTIONE CLICK / TOCCO SINGOLO ---
        btn.onclick = () => {
            if(modalitaSpostamento) {
                if (indicePrimoElemento === null) {
                    // Seleziono il primo prodotto da scambiare
                    indicePrimoElemento = index;
                    mostraCategoria(catAttuale); 
                } else {
                    // Seleziono il secondo e scambio
                    const oggettoDa = filtrati[indicePrimoElemento];
                    const oggettoA = filtrati[index];

                    const daIndexVero = prodottiExtra.indexOf(oggettoDa);
                    const aIndexVero = prodottiExtra.indexOf(oggettoA);

                    // Scambio logico nell'array
                    const temp = prodottiExtra[daIndexVero];
                    prodottiExtra[daIndexVero] = prodottiExtra[aIndexVero];
                    prodottiExtra[aIndexVero] = temp;

                    indicePrimoElemento = null; 
                    salvaSuDisco();
                    mostraCategoria(catAttuale);
                }
            } else {
                // Modalità normale: aggiungi all'ordine
                aggiungiAOrdine(p.nome, p.prezzo, p.reparto);
            }
        };

        // --- GESTIONE PRESSIONE LUNGA (SOLO PER MENU) ---
        let timerPressione;
        
        btn.ontouchstart = (e) => {
            if(modalitaSpostamento) return; // Non aprire il menu se sto spostando
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            
            timerPressione = setTimeout(() => {
                apriMenuContestuale(x, y, p);
            }, 700); // 700ms per distinguere dal tocco rapido
        };

        btn.ontouchend = () => clearTimeout(timerPressione);
        btn.ontouchmove = () => clearTimeout(timerPressione);

        // Per compatibilità Mouse PC (tasto destro)
        btn.oncontextmenu = (e) => {
            e.preventDefault();
            if(!modalitaSpostamento) apriMenuContestuale(e.clientX, e.clientY, p);
        };

        btn.innerHTML = `<span>${p.nome}</span><small>${p.prezzo.toFixed(2)}€</small>`;
        griglia.appendChild(btn);
    });

// --- VARIABILI DI STATO VOCALE (Metterle fuori dalle funzioni) ---
let recognition;
let isListening = false;
let ultimaFraseElaborata = "";
let ultimoTimestamp = 0;
let timerSilenzio; // Utile per i tablet che non chiudono la frase

// Dizionario sinonimi
const sinonimiMenu = {
    "spriz": "spritz",
    "radler": "radler",
    "weisber": "weissbier",
    "mezzo litro": "0.5l",
    "un litro": "1l"
};

function inizializzaVocale() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Browser non supportato.");

    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        isListening = true;
        const btn = document.getElementById('btn-microfono');
        if(btn) {
            btn.style.background = "red";
            btn.innerText = "🎤 ASCOLTO...";
        }
        
        const display = document.getElementById('display-tasti');
        if(display) display.innerHTML = `<span class="ai-preview">Sto ascoltando...</span>`;
    };

    recognition.onresult = (event) => {
        let fraseCorrente = "";

        // 1. Ignoriamo se il tablet pensa che la frase sia finita o meno.
        // Raccogliamo tutto quello che il microfono ha sentito finora in questa passata.
        for (let i = 0; i < event.results.length; ++i) {
            fraseCorrente += event.results[i][0].transcript;
        }

        const display = document.getElementById('display-tasti');
        
        if (fraseCorrente.trim() !== '') {
            // 2. Mostriamo l'anteprima che si aggiorna in tempo reale
            display.innerHTML = `<span class="ai-preview">... ${fraseCorrente.toLowerCase()}</span>`;
            display.scrollLeft = display.scrollWidth;

            // 3. Azzeriamo il timer perché stai ancora parlando
            clearTimeout(timerElaborazione);

            // 4. Facciamo partire il timer: se fai silenzio per 1.2 secondi, l'AI elabora.
            timerElaborazione = setTimeout(() => {
                const frasePulita = fraseCorrente.toLowerCase().trim();
                display.innerHTML = `<span style="color: #2ecc71; font-weight: bold;">✅ ${frasePulita}</span>`;
                
                // Manda l'ordine al cervello
                elaboraDettatoIntelligente(frasePulita);
                
                // 5. TRUCCO MAGICO: Spegniamo il microfono per svuotare la sua cache
                // La funzione onend lo riaccenderà una frazione di secondo dopo, pulito e pronto!
                if (isListening) {
                    recognition.stop();
                }
                
                setTimeout(() => { 
                    if(isListening) display.innerHTML = `<span class="ai-preview">Sto ascoltando...</span>`; 
                }, 1500);

            }, 1200); // 1.2 secondi di pausa per confermare
        }
    };

    recognition.onerror = (event) => {
        console.log("Errore vocale:", event.error);
    };

    recognition.onend = () => {
        // Quando il sistema "stoppa" per pulire la cache, lo riavviamo all'istante
        if (isListening) {
            try { recognition.start(); } catch(e) {}
        }
    };
}
function toggleVocale() {
    if (!recognition) inizializzaVocale();
    
    if (!isListening) {
        recognition.start();
    } else {
        isListening = false;
        recognition.stop();
        const btn = document.getElementById('btn-microfono');
        if(btn) {
            btn.style.background = "#f39c12";
            btn.innerText = "🎤 Vocale";
        }
    }
}
function elaboraDettatoIntelligente(testo) {
    let testoProcessato = testo.toLowerCase().trim();
    
    // --- 1. CORREZIONE SINONIMI ---
    for (let errore in sinonimiMenu) {
        testoProcessato = testoProcessato.replace(errore, sinonimiMenu[errore]);
    }

    // --- 2. ESTRAZIONE MOLTIPLICATORE (Migliorata) ---
    const numeriMappa = { "un": 1, "una": 1, "uno": 1, "due": 2, "tre": 3, "quattro": 4, "cinque": 5, "sei": 6, "sette": 7, "otto": 8, "nove": 9, "dieci": 10 };
    
    let qta = 1;
    let parole = testoProcessato.split(" ");
    let primaParola = parole[0];

    if (!isNaN(parseInt(primaParola))) {
        qta = parseInt(primaParola);
        testoProcessato = parole.slice(1).join(" ");
    } else if (numeriMappa[primaParola]) {
        qta = numeriMappa[primaParola];
        testoProcessato = parole.slice(1).join(" ");
    }

    // --- 3. FUZZY MATCHING ---
    let migliorMatch = null;
    let punteggioMassimo = 0;

    prodottiExtra.forEach(prodotto => {
        const punteggio = calcolaSomiglianza(testoProcessato, prodotto.nome.toLowerCase());
        if (punteggio > punteggioMassimo) {
            punteggioMassimo = punteggio;
            migliorMatch = prodotto;
        }
    });

    // --- 4. AGGIUNTA DIRETTA (Senza passare dal buffer) ---
    if (migliorMatch && punteggioMassimo > 0.40) {
        // Creiamo l'oggetto articolo esattamente come farebbe aggiungiAOrdine
        // ma iniettiamo la QTA rilevata dall'AI
        const nuovoArticolo = { 
            id: Date.now() + Math.random(), 
            nome: migliorMatch.nome, 
            prezzo: migliorMatch.prezzo, 
            qta: qta, 
            reparto: migliorMatch.reparto || 'RIST'
        };
        
        articoliInCorso.push(nuovoArticolo);
        renderingOrdine();
        localStorage.setItem('ordine_corrente', JSON.stringify(articoliInCorso));
        
        console.log(`✅ AI: ${qta} x ${migliorMatch.nome} (Match: ${Math.round(punteggioMassimo*100)}%)`);
    } else {
        console.warn("❌ Non capito: " + testoProcessato);
    }
}
// L'algoritmo di somiglianza rimane lo stesso, è molto efficace per i tuoi articoli simili
function calcolaSomiglianza(str1, str2) {
    const s1 = str1.replace(/\s/g, "");
    const s2 = str2.replace(/\s/g, "");
    let count = 0;
    for (let i = 0; i < s1.length - 1; i++) {
        const bigram = s1.substring(i, i + 2);
        if (s2.includes(bigram)) count++;
    }
    return (2 * count) / (s1.length + s2.length);
}

function attivaVarianteVocale() {
    // 1. Controlla se è stato selezionato un articolo nel carrello
    if (!idRigaSelezionata) {
        alert("Seleziona prima un articolo dal carrello a destra!");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Browser non supportato.");

    const recognitionVariante = new SpeechRecognition();
    recognitionVariante.lang = 'it-IT';

    recognitionVariante.onstart = () => {
        const display = document.getElementById('display-tasti');
        display.innerHTML = `<span style="color: #f39c12;">Dettate variante per l'articolo...</span>`;
    };

    recognitionVariante.onresult = (event) => {
        const dettato = event.results[0][0].transcript.toLowerCase();
        applicaVariante(dettato);
    };

    recognitionVariante.start();
}

function applicaVariante(testoVariante) {
    // Trova l'articolo selezionato nell'array degli articoli in corso
    const indice = articoliInCorso.findIndex(item => item.id === idRigaSelezionata);

    if (indice !== -1) {
        // Pulizia intelligente: se detti il nome del prodotto + la variante
        // (es: "coca cola con ghiaccio"), proviamo a togliere il nome del prodotto
        let nomeProdotto = articoliInCorso[indice].nome.toLowerCase();
        let notaPulita = testoVariante.replace(nomeProdotto, "").trim();
        
        // Se la nota è vuota (hai detto solo il nome del prodotto), usiamo tutto il dettato
        if (notaPulita === "") notaPulita = testoVariante;

        // Aggiunge la variante tra parentesi
        articoliInCorso[indice].nome += ` (${notaPulita})`;
        
        // Aggiorna l'interfaccia e salva
        renderingOrdine();
        localStorage.setItem('ordine_corrente', JSON.stringify(articoliInCorso));
        
        // Feedback sul display
        document.getElementById('display-tasti').innerHTML = 
            `<span style="color: #2ecc71;">Variante aggiunta: ${notaPulita}</span>`;
    }
}
  window.onload = () => {
    // 1. Recupera i prodotti extra (+Voce)
    const extraSalvati = localStorage.getItem('prodotti_extra');
    if (extraSalvati) {
        prodottiExtra = JSON.parse(extraSalvati);
    }
    
    // 2. Recupera l'ordine che stavi scrivendo a destra
    const ordineSospeso = localStorage.getItem('ordine_corrente');
    if (ordineSospeso) {
        articoliInCorso = JSON.parse(ordineSospeso);
        renderingOrdine(); // Ridisegna la lista a destra
    }

    // 3. Mostra la categoria iniziale
    mostraCategoria('bevande'); 
};
